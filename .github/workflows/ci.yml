name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm vitest run --reporter=verbose 2>/dev/null || echo "No vitest config or tests found; skipping test step"
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY || 'sk-test' }}
          MIMO_API_BASE_URL: http://localhost:9999
          MIMO_MODEL: test-model
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_STREAMING_ENABLED: false
